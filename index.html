<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarbix Launch</title>
  <style>
    :root {
      --bg: #0a0d14;
      --bg-soft: #101725;
      --card: rgba(255, 255, 255, 0.06);
      --line: rgba(255, 255, 255, 0.15);
      --text: #eef3ff;
      --muted: #9aa6bf;
      --accent: #35e0b8;
      --accent-2: #4e8cff;
      --glow: 0 0 30px rgba(53, 224, 184, 0.25);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Segoe UI", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 700px at 10% -10%, rgba(78, 140, 255, 0.2), transparent 55%),
                  radial-gradient(900px 550px at 90% 10%, rgba(53, 224, 184, 0.15), transparent 50%),
                  linear-gradient(145deg, #070a11 0%, #0a0d14 40%, #0e1320 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
      opacity: 0.25;
    }

    .wrap {
      max-width: 1024px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 28px 20px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.14em;
      font-weight: 700;
      font-size: clamp(1rem, 1.7vw, 1.2rem);
      color: #dfe8ff;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(8px);
      box-shadow: var(--glow);
      animation: floatIn 800ms ease both;
    }

    .logo .word {
      display: inline-flex;
      align-items: center;
      gap: 0.04em;
      font-family: "Trebuchet MS", "Avenir Next", sans-serif;
    }

    .x-mark {
      width: 1em;
      height: 1em;
      position: relative;
      display: inline-block;
      transform: translateY(1px) rotate(-10deg);
      filter: drop-shadow(0 0 12px rgba(78, 140, 255, 0.7));
    }

    .x-mark::before,
    .x-mark::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0.16em;
      height: 1em;
      transform-origin: center;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
    }

    .x-mark::before { transform: translate(-50%, -50%) rotate(40deg); }
    .x-mark::after { transform: translate(-50%, -50%) rotate(-40deg); }

    .x-mark i {
      position: absolute;
      width: 0.16em;
      height: 0.16em;
      background: var(--accent);
      border-radius: 2px;
      right: -0.10em;
      top: -0.10em;
      box-shadow: 0 0 12px rgba(53, 224, 184, 0.85);
      animation: pulse 1.6s ease-in-out infinite;
    }

    h1 {
      margin: 4px 0 6px;
      font-size: clamp(2rem, 7vw, 4.2rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      animation: riseIn 900ms ease 120ms both;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.1vw, 1.2rem);
      animation: riseIn 900ms ease 220ms both;
    }

    .countdown {
      margin-top: 8px;
      width: min(860px, 100%);
      display: grid;
      grid-template-columns: repeat(4, minmax(90px, 1fr));
      gap: 12px;
      animation: riseIn 900ms ease 320ms both;
    }

    .unit {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.28);
    }

    .num {
      font-size: clamp(1.5rem, 5vw, 2.3rem);
      font-weight: 700;
      line-height: 1;
    }

    .label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .notify {
      width: min(700px, 100%);
      margin-top: 6px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      animation: riseIn 900ms ease 420ms both;
    }

    .notify p {
      margin: 0 0 12px;
      color: #dde7ff;
      font-weight: 600;
    }

    .form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input[type="email"] {
      flex: 1 1 280px;
      min-width: 0;
      border: 1px solid var(--line);
      background: rgba(13, 18, 30, 0.9);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 12px;
      outline: none;
      font-size: 0.96rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="email"]:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 4px rgba(78,140,255,0.18);
    }

    button {
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      color: #03121d;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.05); }

    .tiny {
      margin: 12px 0 0;
      color: #7f8ba2;
      font-size: 0.82rem;
      min-height: 1.1em;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.65); opacity: 0.65; }
    }

    @media (max-width: 640px) {
      .wrap { padding-top: 24px; gap: 22px; }
      .countdown { gap: 8px; }
      .unit { border-radius: 12px; padding: 10px 8px; }
      .notify { padding: 14px; border-radius: 14px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo" aria-label="Tarbix logo">
      <span class="word">TARBI<span class="x-mark" aria-hidden="true"><i></i></span></span>
    </div>

    <section>
      <h1>Tarbix is launching soon</h1>
      <p class="sub">Something fun is coming.</p>
    </section>

    <section class="countdown" aria-label="Launch countdown">
      <div class="unit"><div id="days" class="num">00</div><span class="label">Days</span></div>
      <div class="unit"><div id="hours" class="num">00</div><span class="label">Hours</span></div>
      <div class="unit"><div id="minutes" class="num">00</div><span class="label">Minutes</span></div>
      <div class="unit"><div id="seconds" class="num">00</div><span class="label">Seconds</span></div>
    </section>

    <section class="notify">
      <p>Get notified at launch</p>
      <form class="form" onsubmit="event.preventDefault(); showNotice();">
        <input type="email" placeholder="you@example.com" aria-label="Email address" required />
        <button type="submit">Notify Me</button>
      </form>
      <p id="notice" class="tiny"></p>
    </section>
  </main>

  <script>
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 21);

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    function showNotice() {
      document.getElementById("notice").textContent = "Thanks. We'll keep you posted.";
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
